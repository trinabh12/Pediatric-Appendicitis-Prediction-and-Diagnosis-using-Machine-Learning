<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pediatric Appendicitis Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Pediatric Appendicitis Prediction</h1>
        <form id="predictionForm" enctype="multipart/form-data">
            <h2>Patient Information</h2>
            <div class="form-group">
                <label for="age">Age (years):</label>
                <input type="number" id="age" name="age" required min="0" max="18">
            </div>
            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="">Select</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <h2>Symptoms</h2>
            <div class="form-group">
                <label for="pain_duration">Pain Duration (hours):</label>
                <input type="number" id="pain_duration" name="pain_duration" min="0">
            </div>
            <div class="form-group">
                <label for="migration_of_pain">Migration of Pain:</label>
                <select id="migration_of_pain" name="migration_of_pain">
                    <option value="">Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="anorexia">Anorexia:</label>
                <select id="anorexia" name="anorexia">
                    <option value="">Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nausea">Nausea:</label>
                <select id="nausea" name="nausea">
                    <option value="">Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="vomiting">Vomiting:</label>
                <select id="vomiting" name="vomiting">
                    <option value="">Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="right_lower_quadrant_pain">Right Lower Quadrant Pain:</label>
                <select id="right_lower_quadrant_pain" name="right_lower_quadrant_pain">
                    <option value="">Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="fever">Fever:</label>
                <select id="fever" name="fever">
                    <option value="">Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="rebound_tenderness">Rebound Tenderness:</label>
                <select id="rebound_tenderness" name="rebound_tenderness">
                    <option value="">Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <h2>Laboratory Values</h2>
            <div class="form-group">
                <label for="white_blood_cell_count">White Blood Cell Count (x10^9/L):</label>
                <input type="number" id="white_blood_cell_count" name="white_blood_cell_count" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label for="neutrophil_percentage">Neutrophil Percentage (%):</label>
                <input type="number" id="neutrophil_percentage" name="neutrophil_percentage" step="0.1" min="0" max="100">
            </div>
            <div class="form-group">
                <label for="c_reactive_protein">C-Reactive Protein (mg/L):</label>
                <input type="number" id="c_reactive_protein" name="c_reactive_protein" step="0.1" min="0">
            </div>

            <h2>Ultrasound Image</h2>
            <div class="form-group">
                <label for="ultrasound_image">Upload Ultrasound Image:</label>
                <input type="file" id="ultrasound_image" name="ultrasound_image" accept="image/*">
            </div>

            <button type="submit">Predict</button>
        </form>

        <div id="result" class="result hidden">
            <h2>Prediction Result</h2>
            <p id="diagnosis"></p>
            <p id="confidence"></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
